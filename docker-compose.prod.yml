version: "3.9"

services:
  backend:
    build:
      context: ./backend
      target: production
    restart: always
    volumes: []
    environment:
      - ENVIRONMENT=production

  frontend:
    build:
      context: ./frontend
      target: production
    restart: always

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
