version: "3.9"

services:
  backend:
    build: ./backend
    container_name: owasp-llm-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - llmlab
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    container_name: owasp-llm-frontend
    restart: unless-stopped
    networks:
      - llmlab

  nginx:
    image: nginx:alpine
    container_name: owasp-llm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - llmlab
    depends_on:
      - backend
      - frontend

networks:
  llmlab:
    driver: bridge
